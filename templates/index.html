<!DOCTYPE html>
<html>
<head>
    <title>AI Deepfake Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.08);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,255,255,0.2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        video, img {
            margin-top: 15px;
            width: 100%;
            border-radius: 10px;
            display: none;
        }

        #loader {
            display: none;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🤖 Deepfake Detector</h2>
    <p>AI-powered authenticity checker</p>

    <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
        <input type="file" name="file" class="form-control mt-3"
                accept="image/*,video/*"
                onchange="previewFile(event)" required>

        <!-- Preview -->
        <video id="videoPreview" controls></video>
        <img id="imagePreview">

        <button class="btn btn-light mt-3 w-100">Analyze</button>
    </form>

    <!-- Loader -->
    <div id="loader" class="mt-3">
        <div class="spinner-border text-light"></div>
        <p>🧠 AI is analyzing...</p>
    </div>
</div>

<script>
function previewFile(event) {
    const file = event.target.files[0];
    const video = document.getElementById('videoPreview');
    const image = document.getElementById('imagePreview');

    if (!file) return;

    const url = URL.createObjectURL(file);

    video.style.display = "none";
    image.style.display = "none";

    if (file.type.startsWith("video")) {
        video.src = url;
        video.style.display = "block";
    } else {
        image.src = url;
        image.style.display = "block";
    }
}

function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
